services:
  - type: web
    name: big-board
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: big-board-db
          property: connectionString
      - key: FMP_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_PIN
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 22.12.0

  - type: cron
    name: big-board-snapshot
    runtime: node
    schedule: "30 21 * * 1-5" # 21:30 UTC = 4:30/5:30 PM ET, after market close, Mon-Fri
    buildCommand: npm ci
    startCommand: npx tsx scripts/snapshot-cron.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: big-board-db
          property: connectionString
      - key: FMP_API_KEY
        sync: false

databases:
  - name: big-board-db
    plan: basic-256mb
